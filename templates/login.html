{% extends 'base.html' %}
{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    background: #e5e5e5;
    display: flex;
    justify-content: center;
}

/* MOBILE FRAME */
.container-box {
    width: 100%;
    max-width: 420px;
    background: #f2f3f7;
    min-height: 100vh;
}

/* HEADER */
.header {
    background: linear-gradient(180deg,#ff6b6b,#ff4d4d);
    padding: 20px;
    color: white;
}

.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-weight: bold;
    font-style: italic;
    font-size: 20px;
}

.subtext {
    font-size: 13px;
    margin-top: 15px;
}

/* TABS */
.tabs {
    display: flex;
    margin-top: -30px;
    background: #f2f3f7;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 15px;
    font-weight: 500;
    color: #888;
    border-bottom: 2px solid transparent;
}

.tab.active {
    color: red;
    border-bottom: 2px solid red;
}

/* CARD */
.card {
    background: #f2f3f7;
    border-radius: 20px 20px 0 0;
    padding: 20px;
}

/* INPUT STYLE */
.input-box {
    background: #e9ebf0;
    border-radius: 12px;
    padding: 15px;
    border: none;
    width: 100%;
}

.phone-row {
    display: flex;
    gap: 10px;
}

.code {
    width: 80px;
    background: #e9ebf0;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* PASSWORD */
.password {
    position: relative;
}

.eye {
    position: absolute;
    right: 10px;
    top: 15px;
}

/* BUTTON */
.login-btn {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    background: #c7c9d3;
    border: none;
    font-weight: bold;
    margin-top: 20px;
}

.register-btn {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    border: 2px solid red;
    color: red;
    background: white;
    margin-top: 15px;
    text-align: center;
}

/* BOTTOM */
.bottom {
    display: flex;
    justify-content: space-around;
    margin-top: 30px;
}

.bottom div {
    text-align: center;
    font-size: 12px;
}

.icon-circle {
    width: 50px;
    height: 50px;
    background: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 5px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

</style>

<div class="container-box">

    <!-- HEADER -->
    <div class="header">
        <div class="nav">
            ←
            <div class="logo">DG CLUB</div>
            EN
        </div>

        <div class="subtext">
            Please log in with your phone number or email <br>
            If you forget your password, please contact customer service
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <div class="tab active">
            <i class="fa fa-mobile"></i><br>
            phone number
        </div>
        <div class="tab">
            <i class="fa fa-envelope"></i><br>
            Email Login
        </div>
    </div>

    <!-- CARD -->
    <div class="card">
        <form method="post">
            {% csrf_token %}

            <label>Phone number</label>
            <div class="phone-row">
                <div class="code">+91</div>
                <input type="text" name="username" class="input-box" placeholder="Please enter the phone number">
            </div>

            <label style="margin-top:15px;">Password</label>
            <div class="password">
                <input type="password" id="pwd" name="password" class="input-box" placeholder="Password">
                <i class="fa fa-eye-slash eye" onclick="toggle()"></i>
            </div>

            <div style="margin-top:15px;">
                <input type="checkbox"> Remember password
            </div>

            <button class="login-btn">Log in</button>
            <div class="register-btn">Register</div>
        </form>

        <div class="bottom">
            <div>
                <div class="icon-circle"><i class="fa fa-lock"></i></div>
                Forgot password
            </div>
            <div>
                <div class="icon-circle"><i class="fa fa-headphones"></i></div>
                Customer Service
            </div>
        </div>

    </div>

</div>

<script>
function toggle(){
    let x = document.getElementById("pwd");
    x.type = x.type === "password" ? "text" : "password";
}
</script>

{% endblock %}
