{% extends 'base.html' %}

{% block content %}
<style>
    body {
        background-color: #f7f8ff;
        margin: 0;
        font-family: Arial, sans-serif;
    }
    
    /* Top Red Section */
    .top-gradient-header {
        background: #f95959; 
        padding: 15px 15px 80px 15px;
        color: white;
        text-align: center;
        position: relative;
    }
    
    .header-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 1.1rem;
    }

    .logo-text {
        font-weight: 900;
        font-style: italic;
        font-size: 1.5rem;
        color: white;
    }

    .login-title-section {
        text-align: left;
        margin-top: 20px;
    }

    .login-title-section h2 {
        margin: 0;
        font-size: 1.6rem;
    }

    .login-title-section p {
        font-size: 0.8rem;
        opacity: 0.9;
        margin: 5px 0;
    }

    /* Tabs inside Red Header */
    .tabs-wrapper {
        display: flex;
        justify-content: space-around;
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0 10px;
    }
    
    .tab {
        flex: 1;
        padding: 12px 0;
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.95rem;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
    }
    
    .tab.active {
        color: white;
        font-weight: bold;
        position: relative;
    }

    .tab.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        width: 80%;
        height: 3px;
        background: white;
        border-radius: 2px;
    }

    .tab i { font-size: 1.4rem; }

    /* White Content Box */
    .form-wrapper {
        background: white;
        border-radius: 25px 25px 0 0;
        padding: 25px 20px;
        margin-top: -20px;
        position: relative;
        z-index: 5;
    }
    
    .input-label {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1rem;
        margin-bottom: 10px;
        color: #333;
    }

    .input-row {
        display: flex;
        align-items: center;
        background: #f8f9ff;
        border-radius: 10px;
        padding: 12px 15px;
        margin-bottom: 20px;
        border: 1px solid #eee;
    }

    .country-select {
        display: flex;
        align-items: center;
        gap: 5px;
        padding-right: 10px;
        border-right: 1px solid #d1d1d1;
        margin-right: 10px;
        font-weight: bold;
    }

    input {
        border: none;
        background: transparent;
        width: 100%;
        outline: none;
        font-size: 1rem;
    }

    .btn-submit {
        background: #f0f0f0; 
        color: #bbbbbb;
        width: 100%;
        border: none;
        padding: 15px;
        border-radius: 30px;
        font-size: 1.2rem;
        font-weight: bold;
        margin-top: 10px;
        cursor: pointer;
    }

    .btn-register {
        display: block;
        width: 100%;
        text-align: center;
        border: 1px solid #f95959;
        color: #f95959;
        padding: 12px;
        border-radius: 30px;
        margin-top: 15px;
        text-decoration: none;
        font-weight: bold;
    }

    .footer-links {
        display: flex;
        justify-content: space-around;
        margin-top: 30px;
        text-align: center;
    }

    .footer-item i {
        display: block;
        font-size: 1.5rem;
        color: #f95959;
        margin-bottom: 5px;
    }
</style>

<div class="top-gradient-header">
    <div class="header-nav">
        <i class="fas fa-chevron-left"></i>
        <div class="logo-text">DG CLUB</div>
        <div class="lang">🇮🇳 EN</div>
    </div>
    
    <div class="login-title-section">
        <h2>Log in</h2>
        <p>Please log in with your phone number or email</p>
    </div>

    <div class="tabs-wrapper">
        <div class="tab active">
            <i class="fas fa-mobile-alt"></i>
            <span>phone number</span>
        </div>
        <div class="tab">
            <i class="fas fa-envelope"></i>
            <span>Email Login</span>
        </div>
    </div>
</div>

<div class="form-wrapper">
    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{% url 'account' %}">

        <div class="input-label">
            <i class="fas fa-mobile-alt" style="color:#f95959;"></i> Phone number
        </div>
        <div class="input-row">
            <div class="country-select">+91 <i class="fas fa-chevron-down" style="font-size:0.7rem;"></i></div>
            <input type="text" name="username" placeholder="Please enter the phone number" required>
        </div>

        <div class="input-label">
            <i class="fas fa-lock" style="color:#f95959;"></i> Password
        </div>
        <div class="input-row">
            <input type="password" name="password" placeholder="Password" required>
            <i class="fas fa-eye-slash" style="color:#ccc;"></i>
        </div>

        <div style="margin-bottom:20px; color:#666;">
            <input type="checkbox"> Remember password
        </div>

        <button type="submit" class="btn-submit">Log in</button>
        <a href="#" class="btn-register">Register</a>
    </form>

    <div class="footer-links">
        <div class="footer-item">
            <i class="fas fa-unlock-alt"></i>
            <span>Forgot password</span>
        </div>
        <div class="footer-item">
            <i class="fas fa-headset"></i>
            <span>Customer Service</span>
        </div>
    </div>
</div>
{% endblock %}
